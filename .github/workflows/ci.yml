name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: mkdir -p reports/pr-comment

      - id: tests
        run: node --test

      - name: Generate safe storage append report
        if: always()
        run: node src/index.js check --current-build-info fixtures/real-world/safe-storage-append/build/current.build-info.json --proposed-build-info fixtures/real-world/safe-storage-append/build/proposed.build-info.json --contract SafeTreasuryVault --format json --output reports/pr-comment/safe-storage-append.json --silent --strict

      - name: Generate governance downgrade report
        if: always()
        run: node src/index.js check --current-build-info fixtures/real-world/governance-downgrade/build/current.build-info.json --proposed-build-info fixtures/real-world/governance-downgrade/build/proposed.build-info.json --contract GovernedVault --format json --output reports/pr-comment/governance-downgrade.json --silent

      - name: Generate unsafe implementation report
        if: always()
        run: node src/index.js check --current-build-info fixtures/real-world/uups-unsafe-implementation/build/current.build-info.json --proposed-build-info fixtures/real-world/uups-unsafe-implementation/build/proposed.build-info.json --contract UUPSUnsafeVault --format json --output reports/pr-comment/uups-unsafe-implementation.json --silent

      - name: Render PR summary
        if: always()
        run: >
          node scripts/render-pr-comment.mjs
          --ci-result "${{ job.status }}"
          --report "Safe storage append=reports/pr-comment/safe-storage-append.json"
          --report "Governance downgrade=reports/pr-comment/governance-downgrade.json"
          --report "Unsafe implementation=reports/pr-comment/uups-unsafe-implementation.json"
          --output reports/pr-comment/comment.md

      - name: Publish step summary
        if: always()
        run: cat reports/pr-comment/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-upgrade-firewall-reports
          path: reports/pr-comment
          if-no-files-found: warn

  pr-comment:
    if: github.event_name == 'pull_request' && always()
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Download smoke reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: proxy-upgrade-firewall-reports
          path: reports/pr-comment

      - name: Upsert PR comment
        if: always()
        uses: actions/github-script@v8
        env:
          COMMENT_PATH: reports/pr-comment/comment.md
          COMMENT_MARKER: "<!-- proxy-upgrade-firewall-pr-comment -->"
          SMOKE_RESULT: ${{ needs.smoke.result }}
        with:
          script: |
            const fs = require("fs");
            const commentPath = process.env.COMMENT_PATH;
            const marker = process.env.COMMENT_MARKER;
            const smokeResult = process.env.SMOKE_RESULT;
            const defaultBody = [
              marker,
              "## Proxy Upgrade Firewall",
              "",
              `CI status: \`${smokeResult}\``,
              "",
              "Smoke reports were not generated."
            ].join("\n");
            const body = fs.existsSync(commentPath)
              ? fs.readFileSync(commentPath, "utf8")
              : defaultBody;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
