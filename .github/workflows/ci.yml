name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test
      - run: node src/index.js check --fixture fixtures/corpus/uups-admin-drift --format markdown --output reports/uups-admin-drift.md --strict
