name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: node --test
      - run: node src/index.js check --fixture fixtures/corpus/uups-admin-drift --format markdown --output reports/uups-admin-drift.md
      - run: node src/index.js check --current-build-info fixtures/real-world/safe-storage-append/build/current.build-info.json --proposed-build-info fixtures/real-world/safe-storage-append/build/proposed.build-info.json --contract SafeTreasuryVault --format markdown --output reports/safe-storage-append.md --strict
